# Skill (SKILL.md) mutation rules
# diagnoser 归因到 F1 时查这里
# 仅适用于被测对象本身是 Claude Code skill 的场景

rules:
  - id: F1.1_description_trigger_words
    target: skill
    target_files:
      - .claude/skills/<skill-name>/SKILL.md
    risk: low
    what: 在 SKILL.md description 增加明确触发词
    why: |
      F1.1 是 skill 没触发。
      description 是触发的主要依据，加上具体触发词能提升触发率。
    how: |
      修改 frontmatter 的 description 字段：
      
      原来：
      description: A skill for analyzing loan applications.
      
      改为：
      description: |
        Analyze loan applications and assess risk. Use this skill whenever
        the user mentions "贷款申请", "风险审查", "loan risk", "credit assessment",
        or wants to evaluate a loan application's risk level. Trigger this skill
        even if the user only says "帮我看看这个申请" when loan context is implied.
        
      关键原则：
      - 列出具体触发词（中英文都列）
      - 用 "Use this skill whenever..." 句式
      - 加 "Trigger this skill even if..." 防漏触发

  - id: F1.2_description_anti_trigger
    target: skill
    target_files:
      - .claude/skills/<skill-name>/SKILL.md
    risk: low
    what: 在 description 增加 should-not-trigger 反例；考虑拆分过大的 skill
    why: |
      F1.2 是 skill 误触发。
      显式反例能减少误触发。
    how: |
      在 description 末尾加：
      
      Do NOT use this skill for:
      - 贷款审批流程本身（用 loan-approval skill）
      - 信用卡申请（用 credit-card skill）
      - 用户身份验证（use auth skill）
      
      如果一个 skill 包含超过 5 个明显不同的任务类型，应该拆分成多个 skill。

  - id: F1.3_strong_reference_in_skill
    target: skill
    target_files:
      - .claude/skills/<skill-name>/SKILL.md
    risk: low
    what: 把 reference 引用从弱引用改成强引用；关键内容直接内联
    why: |
      F1.3 是 skill 触发了但没加载关键 reference。
      弱引用（"see X.md"）容易被忽略。
    how: |
      原来：
      For details, see guides/risk_rules.md.
      
      改为：
      ## 必读：风险审查规则
      在开始任何分析前，必须先读 guides/risk_rules.md，否则分析结果无效。
      
      或者直接内联关键内容：
      
      ## 风险审查规则（必读）
      1. 近6个月流水波动 > 30% 时必须提示风险
      2. 担保信息缺失时不能给出通过结论
      3. 负债率 > 70% 时必须提示风险
      
      完整规则见 guides/risk_rules.md（处理边界情况时再读）。

  - id: UNKNOWN_inspect_trace
    target: unknown
    target_files: []
    risk: high
    what: 无法归因，需要人工检查 trace 和插桩
    why: |
      UNKNOWN 说明 diagnoser 无法从现有 trace 推断失败原因。
      可能是：
      1. trace 太短（adapter 或插桩出问题）
      2. 缺关键字段（如没记录 tool_call）
      3. case 本身定义有问题
    how: |
      1. 打开 .agent-eval/traces/<run_id>.jsonl，找到对应 case_run_id 的事件
      2. 检查是否有 agent_start / agent_final 事件
      3. 如果事件不全，检查 Spring AI 端 EvalTraceAdvisor 和 EvalToolCallbackWrapper 是否正确挂载
      4. 如果事件齐全但归因不到 F1-F7，可能需要扩展 taxonomy（见 guides/04_failure_taxonomy.md）
