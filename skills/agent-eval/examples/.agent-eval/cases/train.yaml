# train split — 用于迭代优化时跑的小集合
# 一条 case 是一个 dict，schema 见 guides/04_failure_taxonomy.md

cases:
  - id: loan_risk_001
    name: 风险审查-企业流水异常识别
    agent: loan-risk-agent
    task: >
      用户提交企业贷款申请，系统需要分析流水波动、负债情况和担保信息，
      给出是否需要补充材料的结论。
    input:
      user_message: "请帮我分析这个企业贷款申请是否有风险"
      application_id: "A001"
      attachments:
        - data/loan_case_001.json

    expected:
      final_decision:
        contains:
          - "流水波动"
          - "负债"
          - "补充材料"

    expected_tools:
      required:
        - load_loan_application
        - analyze_cashflow
        - check_debt_ratio
      forbidden:
        - approve_loan_directly
      order:
        soft:
          - load_loan_application
          - analyze_cashflow
          - check_debt_ratio

    business_rules:
      must_satisfy:
        - id: risk_rule_cashflow_volatility
          description: 近 6 个月流水波动超过阈值时必须提示风险
          trace_event_contains:
            event: tool_result
            field: result.summary
            equals: "mock result of analyze_cashflow"
        - id: risk_rule_missing_guarantee
          description: 担保信息缺失时不能直接给出通过结论
          final_answer_contains:
            - "担保"

    expected_steps: 9
    scoring:
      hard_fail_if:
        - forbidden_tool_called
        - missing_required_business_rule
        - invalid_json_schema

