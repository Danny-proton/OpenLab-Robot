# 指标定义文件
# scorer.py 会读这里的 formula，但 v0 的 scorer 是硬编码实现，
# 这个文件主要作为"指标文档"存在，方便人和 LLM 查阅。
# 未来 v1 会改为 scorer 动态解析 formula。

name: task_success
version: 1
description: 最终答案是否满足 case.expected.final_decision 约束
type: hard
weight: 0.35
components:
  - name: keyword_contains
    formula: all(kw in final_answer for kw in expected.final_decision.contains)
    source: final_answer
  - name: regex_match
    formula: all(re.search(rx, final_answer) for rx in expected.final_decision.regex)
    source: final_answer
    optional: true
aggregate: "1.0 if all components pass else 0.0"
hard_fail: false
note: |
  task_success 不直接触发 hard_fail，但它的 0 分会让加权总分显著下降。
  真正的 hard_fail 由 case.scoring.hard_fail_if 控制。
