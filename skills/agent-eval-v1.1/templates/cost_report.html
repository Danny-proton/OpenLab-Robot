<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Eval — 成本报表</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
       background: #0f172a; color: #e2e8f0; font-size: 14px; padding: 32px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { font-size: 24px; color: #60a5fa; margin-bottom: 24px; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; }
.stat-card .label { font-size: 12px; color: #94a3b8; text-transform: uppercase; }
.stat-card .value { font-size: 28px; font-weight: 700; color: #f1f5f9; margin: 4px 0; }
.stat-card .value.cost { color: #fbbf24; }
.stat-card .sub { font-size: 12px; color: #64748b; }
table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; }
th { color: #94a3b8; font-weight: 600; font-size: 12px; text-transform: uppercase; }
td { color: #e2e8f0; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }
.section { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
.section h2 { font-size: 18px; color: #60a5fa; margin-bottom: 16px; }
.bar-chart { margin: 8px 0; }
.bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.bar-row .label { width: 180px; font-size: 13px; color: #94a3b8; text-align: right; }
.bar-row .track { flex: 1; height: 20px; background: #334155; border-radius: 4px; overflow: hidden; }
.bar-row .fill { height: 100%; background: #3b82f6; border-radius: 4px; transition: width 0.5s; }
.bar-row .val { width: 80px; font-size: 13px; color: #e2e8f0; }
.model-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #1e3a5f; color: #60a5fa; }
</style>
</head>
<body>
<div class="container">
  <h1>成本报表</h1>
  <div id="summaryGrid" class="summary-grid"></div>

  <div class="section">
    <h2>按用例聚合</h2>
    <div id="byCaseTable"></div>
  </div>

  <div class="section">
    <h2>按工具调用聚合</h2>
    <div id="byToolTable"></div>
  </div>

  <div class="section">
    <h2>按维度聚合</h2>
    <div id="byDimTable"></div>
  </div>

  <div class="section">
    <h2>成本分布图</h2>
    <div id="costChart"></div>
  </div>
</div>

<script>
// Data will be injected by the server or loaded from a JSON file
const DATA = __DATA_PLACEHOLDER__;

function render() {
  if (!DATA || DATA.error) {
    document.getElementById('summaryGrid').innerHTML = '<div class="section"><p>无数据。请先运行评测并启用 --track-costs。</p></div>';
    return;
  }

  const totalInput = DATA.total_tokens_input || 0;
  const totalOutput = DATA.total_tokens_output || 0;
  const totalCost = DATA.total_cost_cents || 0;
  const groups = DATA.groups || [];

  // Summary
  document.getElementById('summaryGrid').innerHTML = `
    <div class="stat-card"><div class="label">Input Tokens</div><div class="value">${totalInput.toLocaleString()}</div><div class="sub">总输入</div></div>
    <div class="stat-card"><div class="label">Output Tokens</div><div class="value">${totalOutput.toLocaleString()}</div><div class="sub">总输出</div></div>
    <div class="stat-card"><div class="label">总 Token</div><div class="value">${(totalInput + totalOutput).toLocaleString()}</div><div class="sub">input + output</div></div>
    <div class="stat-card"><div class="label">总成本</div><div class="value cost">$${(totalCost / 100).toFixed(4)}</div><div class="sub">美元</div></div>
    <div class="stat-card"><div class="label">分组数</div><div class="value">${groups.length}</div><div class="sub">按 ${DATA.aggregate_by}</div></div>
  `;

  // Tables
  renderTable('byCaseTable', groups);
  renderChart('costChart', groups);
}

function renderTable(containerId, groups) {
  const maxCost = Math.max(...groups.map(g => g.cost_cents || 0), 0.01);
  let html = '<table><thead><tr><th>Key</th><th class="num">Input Tokens</th><th class="num">Output Tokens</th><th class="num">Cost ($)</th><th class="num">Cost %</th></tr></thead><tbody>';
  groups.sort((a, b) => (b.cost_cents || 0) - (a.cost_cents || 0));
  for (const g of groups) {
    const pct = ((g.cost_cents || 0) / maxCost * 100).toFixed(1);
    html += `<tr>
      <td>${g.key}</td>
      <td class="num">${(g.tokens_input || 0).toLocaleString()}</td>
      <td class="num">${(g.tokens_output || 0).toLocaleString()}</td>
      <td class="num">$${(g.cost_cents / 100).toFixed(4)}</td>
      <td class="num">${pct}%</td>
    </tr>`;
  }
  html += '</tbody></table>';
  document.getElementById(containerId).innerHTML = html;
}

function renderChart(containerId, groups) {
  const maxCost = Math.max(...groups.map(g => g.cost_cents || 0), 0.01);
  const top = groups.sort((a, b) => (b.cost_cents || 0) - (a.cost_cents || 0)).slice(0, 15);
  let html = '<div class="bar-chart">';
  for (const g of top) {
    const pct = (g.cost_cents / maxCost * 100).toFixed(1);
    html += `<div class="bar-row">
      <div class="label">${g.key}</div>
      <div class="track"><div class="fill" style="width:${pct}%"></div></div>
      <div class="val">$${(g.cost_cents / 100).toFixed(4)}</div>
    </div>`;
  }
  html += '</div>';
  document.getElementById(containerId).innerHTML = html;
}

render();
</script>
</body>
</html>
