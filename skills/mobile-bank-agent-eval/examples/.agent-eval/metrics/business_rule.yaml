name: business_rule_coverage
version: 1
description: case.business_rules.must_satisfy 中关键业务规则的覆盖比例
type: hard
weight: 0.20
components:
  - name: rule_satisfied
    formula: count_satisfied / count_total
    source: trace + final_answer
    description: |
      每条规则按以下优先级判定：
      1. trace_event_contains — trace 中是否出现满足条件的事件
      2. final_answer_contains — final_answer 中是否包含指定关键词
      3. 默认 — 取规则 description 前 4 字作为关键词，检查是否在 final_answer 中
aggregate: "rule_satisfied"
hard_fail: false
note: |
  如果 case.scoring.hard_fail_if 包含 missing_required_business_rule，
  且有规则未满足，则整条 case 直接 hard_fail。
