    business_rules:
      must_satisfy:
        - id: risk_rule_cashflow_volatility
          description: 流水波动分析
          trace_event_contains:
            event: tool_result
            field: result.summary
            equals: "mock result of analyze_cashflow"

    expected_steps: 9
    scoring:
      hard_fail_if:
        - forbidden_tool_called
        - tool_repeat_3x

    test_level: gray_box
    category: functional
    lifecycle: active
    dimension_id: DIM-006
    scenario_id: SC-008
    mock_config:
      mode: repeat_tool
      repeat_tool: analyze_cashflow
