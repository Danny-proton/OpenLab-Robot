# train split — V1.1 用例自优化测试集（8 条，覆盖 F3/F4/F5/F6/F7/F8 + spec缺口 + 过简单）
# 每条 case 用 mock_config.mode 控制 mock 行为，触发不同失败类型
# schema 见 docs/PRD_CASE_SELF_OPTIMIZATION.md §3.3

cases:
  # ===== 1. F3.1 工具选择失败-漏工具（错误集中 F3）=====
  - id: loan_risk_001
    name: 风险审查-企业流水异常识别-漏调流水分析
    agent: loan-risk-agent
    task: >
      用户提交企业贷款申请，系统需要分析流水波动、负债情况和担保信息，
      给出是否需要补充材料的结论。本用例验证 Agent 不会漏调 analyze_cashflow。
    input:
      user_message: "请帮我分析这个企业贷款申请是否有风险"
      application_id: "A001"
      attachments:
        - data/loan_case_001.json

    expected:
      final_decision:
        contains:
          - "流水波动"
          - "负债"
          - "补充材料"

    expected_tools:
      required:
        - load_loan_application
        - analyze_cashflow
        - check_debt_ratio
      forbidden:
        - approve_loan_directly
      order:
        soft:
          - load_loan_application
          - analyze_cashflow
          - check_debt_ratio

    business_rules:
      must_satisfy:
        - id: risk_rule_cashflow_volatility
          description: 近 6 个月流水波动超过阈值时必须提示风险
          trace_event_contains:
            event: tool_result
            field: result.summary
            equals: "mock result of analyze_cashflow"
        - id: risk_rule_missing_guarantee
          description: 担保信息缺失时不能直接给出通过结论
          final_answer_contains:
            - "担保"

    expected_steps: 9
    scoring:
      hard_fail_if:
        - forbidden_tool_called
        - missing_required_business_rule

    test_level: gray_box
    category: functional
    lifecycle: active
    dimension_id: DIM-001
    scenario_id: SC-001
    mock_config:
      mode: skip_tool
      skip_tool: analyze_cashflow

  # ===== 2. F8.2/F8.4 执行冗余-重复规划/探索式徘徊（错误集中 F8）=====
  - id: loan_risk_002
    name: 风险审查-正常通过-冗余思考
    agent: loan-risk-agent
    task: >
      用户提交企业贷款申请，所有材料齐全，流水稳定，无异常。
      本用例验证 Agent 不会在工具调用间插入多余思考。
    input:
      user_message: "请帮我分析这个企业贷款申请是否有风险"
      application_id: "A002"

    expected:
      final_decision:
        contains:
          - "流水波动"
          - "负债"
          - "补充材料"

    expected_tools:
      required:
        - load_loan_application
        - analyze_cashflow
        - check_debt_ratio
      forbidden:
        - approve_loan_directly

    business_rules:
      must_satisfy:
        - id: risk_rule_cashflow_volatility
          description: 流水波动分析
          trace_event_contains:
            event: tool_result
            field: result.summary
            equals: "mock result of analyze_cashflow"
        - id: risk_rule_missing_guarantee
          description: 担保信息分析
          final_answer_contains:
            - "担保"

    expected_steps: 9
    scoring:
      hard_fail_if:
        - forbidden_tool_called
        - missing_required_business_rule

    test_level: gray_box
    category: functional
    lifecycle: active
    dimension_id: DIM-001
    scenario_id: SC-002
    mock_config:
      mode: redundant
      redundant_steps: 4

  # ===== 3. 过简单维度（100% 通过，断言弱）=====
  - id: loan_risk_003
    name: 风险审查-高负债-正常通过
    agent: loan-risk-agent
    task: >
      企业负债率较高，需要重点关注负债分析。
    input:
      user_message: "请帮我分析这个企业贷款申请是否有风险"
      application_id: "A003"

    expected:
      final_decision:
        contains:
          - "流水波动"
          - "负债"
          - "补充材料"

    expected_tools:
      required:
        - load_loan_application
        - analyze_cashflow
        - check_debt_ratio
      forbidden:
        - approve_loan_directly

    business_rules:
      must_satisfy:
        - id: risk_rule_cashflow_volatility
          description: 流水波动分析
          trace_event_contains:
            event: tool_result
            field: result.summary
            equals: "mock result of analyze_cashflow"
        - id: risk_rule_missing_guarantee
          description: 担保信息分析
          final_answer_contains:
            - "担保"

    expected_steps: 9
    scoring:
      hard_fail_if:
        - forbidden_tool_called
        - missing_required_business_rule

    test_level: gray_box
    category: functional
    lifecycle: active
    dimension_id: DIM-001
    scenario_id: SC-003
    mock_config:
      mode: success

  # ===== 4. F5.3 Workflow失败-工具返回空缺fallback（spec缺口：dfx_reliability）=====
  - id: loan_risk_004
    name: 风险审查-担保信息查询异常-缺fallback
    agent: loan-risk-agent
    task: >
      用户提交贷款申请，担保信息查询工具返回空结果，验证 Agent 能处理异常并给出兜底结论。
    input:
      user_message: "请帮我分析这个企业贷款申请是否有风险"
      application_id: "A004"

    expected:
      final_decision:
        contains:
          - "担保"
          - "补充材料"

    expected_tools:
      required:
        - load_loan_application
        - analyze_cashflow
        - check_debt_ratio
        - checkGuaranteeInfo
      forbidden:
        - approve_loan_directly

    business_rules:
      must_satisfy:
        - id: risk_rule_missing_guarantee
          description: 担保信息缺失时不能直接给出通过结论
          final_answer_contains:
            - "担保"

    expected_steps: 10
    scoring:
      hard_fail_if:
        - forbidden_tool_called
        - missing_required_business_rule

    test_level: gray_box
    category: dfx_reliability
    lifecycle: active
    dimension_id: DIM-002
    scenario_id: SC-004
    mock_config:
      mode: empty_result
      empty_result: checkGuaranteeInfo

  # ===== 5. F4.4 工具参数失败-ID错误（参数边界）=====
  - id: loan_risk_005
    name: 风险审查-工具参数边界-ID传错
    agent: loan-risk-agent
    task: >
      用户提交贷款申请，验证 Agent 不会把 applicant_name 当成 id_card 传给查询工具。
    input:
      user_message: "请帮我分析这个企业贷款申请是否有风险"
      application_id: "A005"

    expected:
      final_decision:
        contains:
          - "流水波动"
          - "负债"

    expected_tools:
      required:
        - load_loan_application
        - analyze_cashflow
        - check_debt_ratio
      forbidden:
        - approve_loan_directly

    business_rules:
      must_satisfy:
        - id: risk_rule_cashflow_volatility
          description: 流水波动分析
          trace_event_contains:
            event: tool_result
            field: result.summary
            equals: "mock result of analyze_cashflow"

    expected_steps: 9
    scoring:
      hard_fail_if:
        - forbidden_tool_called

    test_level: gray_box
    category: functional
    lifecycle: active
    dimension_id: DIM-003
    scenario_id: SC-005
    mock_config:
      mode: wrong_param
      wrong_param:
        tool: check_debt_ratio
        field: id_card
        value: "WRONG_ID"

  # ===== 6. F7.4 输出失败-幻觉（幻觉检测）=====
  - id: loan_risk_006
    name: 风险审查-幻觉检测-编造评分
    agent: loan-risk-agent
    task: >
      用户提交贷款申请，验证 Agent 不会在最终答案中编造 trace 里没有的数字（如征信评分）。
    input:
      user_message: "请帮我分析这个企业贷款申请是否有风险"
      application_id: "A006"

    expected:
      final_decision:
        contains:
          - "流水波动"
          - "负债"

    expected_tools:
      required:
        - load_loan_application
        - analyze_cashflow
        - check_debt_ratio
      forbidden:
        - approve_loan_directly

    business_rules:
      must_satisfy:
        - id: risk_rule_no_hallucination
          description: 最终答案不得包含 trace 中不存在的数字
          final_answer_contains_not:
            - "850"

    expected_steps: 9
    scoring:
      hard_fail_if:
        - forbidden_tool_called
        - hallucination_detected

    test_level: gray_box
    category: adversarial
    lifecycle: active
    dimension_id: DIM-004
    scenario_id: SC-006
    mock_config:
      mode: hallucinate
      hallucinate: "征信评分 850 分，建议通过。"

  # ===== 7. F6.1 Memory失败-没检索到（记忆覆盖缺口）=====
  - id: loan_risk_007
    name: 风险审查-多轮上下文-记忆未触发
    agent: loan-risk-agent
    task: >
      用户之前咨询过贷款风险，本次再次询问，验证 Agent 会检索历史记忆。
    input:
      user_message: "我之前问过的那个贷款申请，现在风险分析怎么样了"
      application_id: "A007"

    expected:
      final_decision:
        contains:
          - "流水波动"
          - "负债"

    expected_tools:
      required:
        - load_loan_application
        - analyze_cashflow
        - check_debt_ratio
      forbidden:
        - approve_loan_directly

    business_rules:
      must_satisfy:
        - id: risk_rule_memory_use
          description: 多轮场景必须检索历史记忆
          trace_event_contains:
            event: memory_retrieval
            field: memory_hits
            exists: true

    expected_steps: 10
    scoring:
      hard_fail_if:
        - forbidden_tool_called
        - missing_memory_use

    test_level: gray_box
    category: functional
    lifecycle: active
    dimension_id: DIM-005
    scenario_id: SC-007
    expect_memory_use: true
    mock_config:
      mode: no_memory

  # ===== 8. F3.3 工具选择失败-重复调用（repeat 断言增强）=====
