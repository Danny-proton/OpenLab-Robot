name: output_schema_validity
version: 1
description: 最终答案能否解析并符合 case.expected.structured_output_schema
type: hard
weight: 0.15
components:
  - name: parse_success
    formula: can_extract_json_from(final_answer)
    source: final_answer
    description: |
      从 final_answer 抽 JSON，支持三种格式：
      1. 纯 JSON
      2. ```json ... ``` 代码块
      3. <json>...</json> 标签
  - name: schema_valid
    formula: jsonschema.validate(parsed, schema)
    source: parsed_json + schema_file
    description: 符合 case 指定的 JSON Schema
    requires: parse_success
aggregate: |
  1.0 if parse_success and schema_valid
  else 0.5 if parse_success
  else 0.0
hard_fail: false
note: |
  如果 case.scoring.hard_fail_if 包含 invalid_json_schema，
  且 schema_valid 为 false，则整条 case 直接 hard_fail。
  
  如果 case 没有指定 structured_output_schema，本指标返回 1.0（不适用）。
  
  如果环境没装 jsonschema 库，schema_valid 退化为"只检查 required 字段是否存在"。
