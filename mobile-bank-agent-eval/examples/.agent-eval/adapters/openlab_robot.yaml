# OpenLab Robot adapter 配置
# OpenLab Robot 基于 cc-haha（Claude Code 复现），通过 subprocess 调用其 CLI
#
# 使用前：
#   1. 安装 cc-haha: git clone https://github.com/NanmiCoder/cc-haha.git && cd cc-haha && bun install
#   2. 配置 API key: export ANTHROPIC_AUTH_TOKEN=sk-xxx
#   3. 改下面的 bin 路径指向 cc-haha 的 claude-haha 可执行文件

type: openlab_robot
description: |
  OpenLab Robot 执行 adapter。通过 subprocess 调用 cc-haha CLI（claude-haha），
  用 stream-json 协议获取完整 agent 执行 trace，转成 UATR 格式供评测。
  
  适用于：评测 Claude Code / cc-haha / OpenLab Robot 类的 agent
  不适用于：Spring AI agent（用 spring_ai_http adapter）

# cc-haha 可执行文件路径
# 安装 cc-haha 后，bin 在 /path/to/cc-haha/bin/claude-haha
bin: /path/to/cc-haha/bin/claude-haha

# agent 工作目录（agent 的 cwd，CLAUDE.md / .claude/ 从这里读）
workdir: /tmp/openlab-work

# 环境变量（会覆盖系统环境）
env:
  # API key（二选一）
  ANTHROPIC_AUTH_TOKEN: sk-your-token-here
  # 或 ANTHROPIC_API_KEY: sk-ant-xxx
  
  # 自定义端点（可选，默认 Anthropic 官方）
  # ANTHROPIC_BASE_URL: https://api.minimaxi.com/anthropic
  
  # 模型（可选）
  ANTHROPIC_MODEL: claude-sonnet-4-20250514
  
  # 禁用遥测
  DISABLE_TELEMETRY: "1"
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

# 权限模式（评测沙箱建议 bypassPermissions）
# 可选: default / acceptEdits / plan / bypassPermissions
permission_mode: bypassPermissions

# 最大轮数（防止死循环）
max_turns: 20

# 最大预算（美元，防止烧钱）
max_budget_usd: 1.0

# 超时（秒）
timeout_s: 600

# 允许的工具白名单（空 = 全部允许）
# 常用工具: Bash / Read / Write / Edit / Grep / Glob / WebSearch / WebFetch
allowed_tools: []
  # - Bash
  # - Read
  # - Grep
  # - Glob

# trace 字段映射（cc-haha SDK 消息 → UATR，由 openlab_robot_adapter.py 的 sdk_to_uatr 处理）
trace_mapping:
  # 这个映射在 openlab_robot_adapter.py 的 sdk_to_uatr() 函数里硬编码实现
  # 这里只作文档说明
  system.init: agent.run.start
  assistant.tool_use: tool.call.start
  user.tool_result: tool.call.end
  assistant.text: model.call.end
  system.hook_*: planner.step
  result: agent.run.end

# 脱敏字段（dot-path）
redact_fields: []
