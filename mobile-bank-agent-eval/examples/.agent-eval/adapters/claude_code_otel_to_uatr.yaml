# Claude Code OTel → UATR adapter 配置
# 这个文件配置 claude_code_otel_to_uatr.py 的 span 映射

framework: claude_code
description: |
  Claude Code OTel span → UATR 转换器配置。
  Claude Code 开启增强 telemetry 后会导出 OTel span，
  本配置定义 span name → UATR event_type 的映射。

# span name 前缀 → UATR event_type base
# 一个 span 会生成 .start 和 .end 两个事件
span_mapping:
  claude_code.interaction: agent.run
  claude_code.llm_request: model.call
  claude_code.tool: tool.call
  claude_code.tool.execution: tool.call  # 仅 end
  claude_code.tool.blocked_on_user: human.approval  # 仅 request
  claude_code.hook: planner
  claude_code.subagent_delegation: agent.delegate

# 从 span attributes 提取的字段
attribute_extraction:
  case_id: case_id
  run_id: run_id
  case_run_id: case_run_id
  agent_name: agent_name
  tool_name: tool_name
  tool_arguments: tool_arguments
  tool_result: tool_result
  final_answer: final_answer
  input_tokens: input_tokens
  output_tokens: output_tokens
  latency_ms: latency_ms
  approval_message: approval_message

# 脱敏字段
redact_fields:
  - attributes.tool_arguments.ssn
  - attributes.tool_arguments.id_card
