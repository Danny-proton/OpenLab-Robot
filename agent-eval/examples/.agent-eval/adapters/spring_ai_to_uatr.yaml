# Spring AI → UATR adapter 配置
# 这个文件配置 spring_ai_to_uatr.py 的字段映射

framework: spring_ai
description: |
  Spring AI observation → UATR 转换器配置。
  Spring AI 端通过 EvalTraceAdvisor / EvalToolCallbackWrapper 吐出的事件
  是 camelCase 字段，本配置定义如何映射到 UATR。

# 字段映射（Spring AI camelCase → UATR snake_case）
# 实际转换逻辑在 spring_ai_to_uatr.py 的 convert() 函数里
field_mapping:
  eventType: event_type
  stepNumber: step
  caseRunId: case_run_id
  caseId: case_id
  runId: run_id
  timestamp: timestamp
  agentName: actor.name
  toolName: component.name
  toolArguments: attributes.tool.arguments
  toolResult: output.summary
  errorMessage: attributes.error
  finalAnswer: output.final_answer
  promptHash: attributes.prompt_hash
  inputTokens: metrics.input_tokens
  outputTokens: metrics.output_tokens
  memoryQuery: attributes.memory.query
  memoryHits: attributes.memory.hits
  advisor: attributes.advisor
  latencyMs: metrics.latency_ms
  status: status

# 脱敏字段（dot-path）
redact_fields:
  - attributes.tool.arguments.ssn
  - attributes.tool.arguments.id_card
  - output.summary.phone
